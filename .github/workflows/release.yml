name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version number (e.g. 0.3.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version in pyproject.toml
        run: sed -i 's/^version = ".*"/version = "${{ github.event.inputs.version }}"/' pyproject.toml

      - name: Update version in README citation
        run: sed -i 's/version = {.*}/version = {${{ github.event.inputs.version }}}/' README.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml README.md
          git commit -m "Bump version to ${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push && git push --tags
