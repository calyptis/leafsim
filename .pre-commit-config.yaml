repos:
- repo: https://github.com/kynan/nbstripout
  rev: 0.9.1
  hooks:
    - id: nbstripout
- repo: https://github.com/psf/black
  rev: 26.3.1
  hooks:
  -   id: black
- repo: https://github.com/pycqa/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
    additional_dependencies: [flake8-docstrings]
- repo: https://github.com/pycqa/isort
  rev: 9.0.0a3
  hooks:
    - id: isort
      args: ["--profile", "black"]